# Ergodeon Agent System - Production Docker Compose
version: '3.8'

services:
  ergodeon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ergodeon-prod
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
    volumes:
      - ergodeon-data:/app/data
      - ergodeon-logs:/app/logs
      - ergodeon-specs:/app/.kiro
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - chromadb
    networks:
      - ergodeon-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: ergodeon-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - ergodeon-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  chromadb:
    image: chromadb/chroma:latest
    container_name: ergodeon-chromadb-prod
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - ergodeon-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ergodeon-api-prod
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_HOST=redis
    volumes:
      - ergodeon-data:/app/data
      - ergodeon-logs:/app/logs
    ports:
      - "8002:8000"
    depends_on:
      - redis
      - chromadb
    networks:
      - ergodeon-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: ergodeon-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - ergodeon-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ergodeon-data:
    driver: local
  ergodeon-logs:
    driver: local
  ergodeon-specs:
    driver: local
  redis-data:
    driver: local
  chroma-data:
    driver: local

networks:
  ergodeon-network:
    driver: bridge
